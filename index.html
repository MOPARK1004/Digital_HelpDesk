<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>디지털튜터 헬프데스크 대시보드</title>
    <style>
        /* 화면 전체를 여백 없이 사용하도록 설정 */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            overflow: hidden; /* 스크롤바가 이중으로 생기는 것 방지 */
            background-color: #ffffff; 
        }
        /* 대시보드가 들어갈 창(iframe)을 화면에 꽉 채움 */
        iframe { 
            border: none; 
            width: 100%; 
            height: 100vh; /* 브라우저 높이만큼 꽉 채우기 */
            display: block;
        }
    </style>
</head>
<body>
    <iframe 
        src="https://script.google.com/macros/s/AKfycbxvVCJlItiMy2Cn_s8Ij3b0k40CH5sWZxoG9y0bnYV1bYPNxqQftTIppOKymcUJa2tq/exec" 
        sandbox="allow-scripts allow-forms allow-same-origin allow-popups"
        allow="geolocation; microphone; camera">
    </iframe>
</body>
</html>
